services:
  # Фронтенд
  nginx-frontend:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/var/www/frontend:ro
      - ./docker/nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro

  # Бэкенд Laravel
  nginx-backend:
    image: nginx:stable-alpine
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www/laravel:ro
      - ./docker/nginx/backend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  # Бэкенд PHP-FPM
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/laravel
    environment:
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025

  # Почтовый сервер Mailpit
  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
